openapi: 3.0.0
info:
  title: TaskAPI
  description: Scalable REST API with Authentication & Role-Based Access
  version: 1.0.0
  contact:
    email: admin@taskapi.com

servers:
  - url: http://localhost:5000/api/v1
    description: Development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [user, admin]
        created_at:
          type: string

    Task:
      type: object
      properties:
        id:
          type: string
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [todo, in_progress, done]
        priority:
          type: string
          enum: [low, medium, high]
        due_date:
          type: string
        created_at:
          type: string

paths:
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name:
                  type: string
                  example: John Doe
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
      responses:
        201:
          description: User created successfully
        409:
          description: Email already exists
        422:
          description: Validation failed

  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: john@example.com
                password:
                  type: string
                  example: password123
      responses:
        200:
          description: Login successful returns JWT token
        401:
          description: Invalid credentials

  /auth/me:
    get:
      tags: [Auth]
      summary: Get current logged in user
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profile fetched successfully
        401:
          description: Unauthorized

  /tasks:
    get:
      tags: [Tasks]
      summary: Get my tasks
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
          example: 1
        - in: query
          name: limit
          schema:
            type: integer
          example: 10
        - in: query
          name: status
          schema:
            type: string
            enum: [todo, in_progress, done]
        - in: query
          name: priority
          schema:
            type: string
            enum: [low, medium, high]
      responses:
        200:
          description: Tasks fetched successfully
        401:
          description: Unauthorized

    post:
      tags: [Tasks]
      summary: Create a new task
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [title]
              properties:
                title:
                  type: string
                  example: My first task
                description:
                  type: string
                  example: Task description
                priority:
                  type: string
                  enum: [low, medium, high]
                  example: medium
                due_date:
                  type: string
                  example: 2026-12-31
      responses:
        201:
          description: Task created successfully
        401:
          description: Unauthorized

  /tasks/{id}:
    get:
      tags: [Tasks]
      summary: Get a single task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task fetched successfully
        404:
          description: Task not found

    put:
      tags: [Tasks]
      summary: Update a task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                description:
                  type: string
                status:
                  type: string
                  enum: [todo, in_progress, done]
                priority:
                  type: string
                  enum: [low, medium, high]
                due_date:
                  type: string
      responses:
        200:
          description: Task updated successfully
        404:
          description: Task not found

    delete:
      tags: [Tasks]
      summary: Delete a task
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: Task deleted successfully
        404:
          description: Task not found

  /tasks/admin/all:
    get:
      tags: [Tasks]
      summary: Get all tasks — Admin only
      security:
        - bearerAuth: []
      responses:
        200:
          description: All tasks fetched
        403:
          description: Access denied

  /users:
    get:
      tags: [Users]
      summary: Get all users — Admin only
      security:
        - bearerAuth: []
      responses:
        200:
          description: Users fetched successfully
        403:
          description: Access denied

  /users/me:
    get:
      tags: [Users]
      summary: Get my profile
      security:
        - bearerAuth: []
      responses:
        200:
          description: Profile fetched successfully
        401:
          description: Unauthorized

  /users/{id}:
    get:
      tags: [Users]
      summary: Get single user — Admin only
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User fetched successfully
        404:
          description: User not found

    delete:
      tags: [Users]
      summary: Delete a user — Admin only
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User deleted successfully
        404:
          description: User not found